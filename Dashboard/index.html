</head>
<body>

   <div class="sidebar">
 <div class="logo">
    <img src="logo.jpeg" height="50" alt="Logo">
</div>
  <ul class="nav-links">
    <li><i class="fa-solid fa-house"></i><a href="index.html">  Dashboard</a></li>
    <li><i class="fa-solid fa-circle-dollar-to-slot"></i><a href="add-transaction.html">        Add Transaction</a></li>
    <li><i class="fa-solid fa-chart-column"></i><a href="report.html">    Reports</a></li>
    <li><i class="fa-solid fa-circle-user"></i><a href="about.html">     About</a></li>
  </ul>
</div>


<header class="dashboard_header">
    <div class="header">
        <h1 class="Header-main-title">Dashboard</h1>
        <p class="Header-subtitle">Welcome back, Prajwal</p>
    </div>
    <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input class="serch-place" type="text" placeholder="Search">
     </div>
</header>

<div class="upper-boxs">
 <div class="box1">
  <p class="balance"><i class="fa-solid fa-wallet"></i>          Current Balance</p>
  <span class="rs">
  <i class="fa-solid fa-indian-rupee-sign"></i></span>
  <span id="balanceAmount">0</span>
</div>
<div class="box2">
  <p class="income"><i class="fa-solid fa-arrow-trend-up"></i>        Total Income</p>
  <span class="rs">
  <i class="fa-solid fa-indian-rupee-sign"></i></span>
  <span id="incomeAmount">0</span>
</div>

<div class="box3">
  <p class="expensce"><i class="fa-solid fa-arrow-trend-down"></i>       Total Expense</p>
  <span class="rs">
  <i class="fa-solid fa-indian-rupee-sign"></i></span>
  <span id="expenseAmount">0</span>
</div>

<div class="box4">
  <p class="Budget"><i class="fa-solid fa-chart-column"></i>          Total Budget</p>
  <span class="rs">
  <i class="fa-solid fa-indian-rupee-sign"></i></span>
  <span id="budgetAmount">0</span>
</div>
</div>

<div class="transection-section">

  <p>Recent Transection</p>

  <div class="table">
    <table>
      <thead>
      <th>Date</th>
      <th>Description</th>
      <th>Category</th>
      <th>Amount</th>
      <th>Type</th>
      </thead>

      <tbody id="transactionTable">

      </tbody>
    </table>
  </div>

</div>


</body>
</html>
